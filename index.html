<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto & Animal Type Test</title>
  <link href='/style.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <button id="theme-toggle">Dark Mode</button>
  
  <div class="container">
    <h1>Lotto Number Generator</h1>
    <div id="lotto-numbers" class="lotto-numbers-container"></div>
    <button id="generate-btn">Generate Numbers</button>
  </div>

  <!-- Animal Type Test Section -->
  <div class="container animal-test-container">
    <h2>Animal Face Test</h2>
    <p>Check if you look like a dog or a cat!</p>
    <button type="button" id="start-webcam" onclick="initAnimalTest()">Start Test</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
  </div>

  <div class="container contact-container">
    <h2>Partnership Inquiry</h2>
    <form action="https://formspree.io/f/xeerjrwd" method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Your partnership inquiry..."></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Inquiry</button>
    </form>
  </div>

  <div class="container disqus-container">
    <div id="disqus_thread"></div>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://publicbuilder.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
  <script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/oWNyuc5Sa/";
    let model, webcam, labelContainer, maxPredictions;

    async function initAnimalTest() {
        const startBtn = document.getElementById("start-webcam");
        startBtn.style.display = "none";
        
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(250, 250, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction =
                prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;
            labelContainer.childNodes[i].className = "prediction-item";
        }
    }
  </script>
</body>
</html>
