<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">Dark Mode</button>
  
  <div class="container">
    <h1>Lotto Number Generator</h1>
    <div id="lotto-numbers" class="lotto-numbers-container"></div>
    <button id="generate-btn">Generate Numbers</button>
  </div>

  <div class="container contact-container">
    <h2>Partnership Inquiry</h2>
    <form action="https://formspree.io/f/xeerjrwd" method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Your partnership inquiry..."></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Inquiry</button>
    </form>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
